server {
    listen      80;
    server_name lfs.zquestclassic.com;
    return 301 https://lfs.zquestclassic.com$request_uri;
}

server {
    server_name lfs.zquestclassic.com;
    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lfs.zquestclassic.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lfs.zquestclassic.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Git LFS can have large requests
        client_max_body_size 0;
    }
}
